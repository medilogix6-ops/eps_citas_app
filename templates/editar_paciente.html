{% extends 'base.html' %}
{% block title %}Editar Paciente{% endblock %}
{% block page_title %}✏️ Editar Paciente{% endblock %}
{% block topbar_actions %}
  <a href="{{ url_for('lista_pacientes') }}" class="btn btn-secondary btn-sm">← Volver</a>
{% endblock %}

{% block content %}
<div style="max-width:640px;">
  <div class="card">
    <h2 class="card-title">✏️ Editar Paciente</h2>
    <div style="background:var(--teal-pale);border-radius:8px;padding:.85rem 1rem;margin-bottom:1.5rem;font-size:.875rem;color:var(--teal);">
      Documento: <strong>{{ pac.documento }}</strong>
    </div>
    <form method="POST">
      <div class="form-grid">
        <div class="form-group">
          <label>Nombre *</label>
          <input type="text" name="nombre" value="{{ pac.nombre }}" required/>
        </div>
        <div class="form-group">
          <label>Apellido *</label>
          <input type="text" name="apellido" value="{{ pac.apellido }}" required/>
        </div>
        <div class="form-group">
          <label>Teléfono</label>
          <input type="tel" name="telefono" value="{{ pac.telefono or '' }}"/>
        </div>
        <div class="form-group">
          <label>Correo</label>
          <input type="email" name="correo" value="{{ pac.correo or '' }}"/>
        </div>
        <div class="form-group full">
          <label>EPS</label>
          <select name="eps">
            <option value="">— Seleccione —</option>
            {% for e in ['Sura','Nueva EPS','Compensar','Coomeva','Sanitas','Coosalud','Famisanar','Salud Total','Otra'] %}
              <option {{ 'selected' if pac.eps == e }}>{{ e }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="form-actions">
        <a href="{{ url_for('lista_pacientes') }}" class="btn btn-secondary">Cancelar</a>
        <button type="submit" class="btn btn-primary">💾 Guardar Cambios</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
