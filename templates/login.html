<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Iniciar Sesión — MEDILOGIX</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏥</text></svg>"/>
  <style>body{display:block;}</style>
</head>
<body>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="flash-container" id="fc" style="top:1rem;">
      {% for cat, msg in messages %}
        <div class="flash {{ cat }}">
          <span>{{ '✅' if cat == 'success' else '❌' }}</span>
          <span>{{ msg }}</span>
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<div class="login-page">
  <div class="login-box">
    <div class="logo">
      <span class="logo-icon">🏥</span>
      <h1>MEDILOGIX</h1>
      <p>Red de Salud Integral — Barranquilla, Colombia</p>
    </div>

    <form method="POST">
      <div class="form-group" style="margin-bottom:1rem;">
        <label for="username">Usuario</label>
        <input type="text" id="username" name="username" placeholder="Ej: admin" required autofocus/>
      </div>
      <div class="form-group" style="margin-bottom:1.5rem;">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:.8rem;">
        🔐 Iniciar Sesión
      </button>
    </form>


  </div>
</div>

<script>
  setTimeout(()=>{const fc=document.getElementById('fc');if(fc){fc.style.transition='.5s';fc.style.opacity='0';setTimeout(()=>fc.remove(),500);}},4000);
</script>
</body>
</html>
