{% extends 'base.html' %}
{% block title %}Editar Usuario{% endblock %}
{% block page_title %}✏️ Editar Usuario{% endblock %}
{% block topbar_actions %}
  <a href="{{ url_for('lista_usuarios') }}" class="btn btn-secondary btn-sm">← Volver</a>
{% endblock %}

{% block content %}
<div class="card" style="max-width: 560px; margin: 0 auto;">
  <form method="POST">
    <div class="form-group">
      <label for="username">Usuario</label>
      <input id="username" name="username" class="form-control" value="{{ user.username }}" required />
    </div>

    <div class="form-group">
      <label for="correo">Correo</label>
      <input id="correo" name="correo" type="email" class="form-control" value="{{ user.correo }}" required />
    </div>

    <div class="form-group">
      <label for="rol_id">Rol</label>
      <select id="rol_id" name="rol_id" class="form-control" required>
        <option value="1" {{ 'selected' if user.rol_id == 1 else '' }}>Administrador</option>
        <option value="2" {{ 'selected' if user.rol_id == 2 else '' }}>Paciente</option>
      </select>
    </div>

    <div class="form-group">
      <label for="password">Nueva contraseña</label>
      <input id="password" name="password" type="password" class="form-control" placeholder="Dejar en blanco para no cambiar" />
      <small class="form-text text-muted">Si no deseas cambiar la contraseña, deja este campo vacío.</small>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Guardar cambios</button>
      <a href="{{ url_for('lista_usuarios') }}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
