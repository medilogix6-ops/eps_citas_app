{% extends 'base.html' %}
{% block title %}Reservar Cita{% endblock %}
{% block page_title %}📅 Reservar Cita{% endblock %}
{% block topbar_actions %}
  <a href="{{ url_for('index') }}" class="btn btn-secondary btn-sm">← Volver</a>
{% endblock %}

{% block content %}
<div style="max-width:640px;">
  <div class="card">
    <h2 class="card-title">📅 Nueva Cita Médica</h2>
    <form id="formReserva" method="POST">
      <div class="form-grid">
        <!-- Paso 1: Tipo de Cita -->
        <div class="form-group full">
          <label>Tipo de Cita *</label>
          <select name="tipo_cita" id="tipoCita" required onchange="cargarMedicos()">
            <option value="">— Seleccione tipo de cita —</option>
            <option value="General">Medicina General</option>
            <option value="Odontología">Odontología</option>
            <option value="Especialista">Especialista</option>
          </select>
        </div>

        <!-- Paso 2: Médico (aparece después de elegir tipo) -->
        <div class="form-group full" id="containerMedico" style="display:none;">
          <label>Médico Disponible *</label>
          <select name="medico_id" id="medico" required onchange="cargarFechas()">
            <option value="">— Seleccione médico —</option>
          </select>
          <small style="color:var(--gray);font-size:.78rem;" id="infoMedico"></small>
        </div>

        <!-- Paso 3: Fecha (aparece después de elegir médico) -->
        <div class="form-group full" id="containerFecha" style="display:none;">
          <label>Fecha Disponible *</label>
          <div id="calendarFecha" class="calendar-container" aria-label="Calendario de disponibilidad"></div>
          <small style="color:var(--gray);font-size:.78rem;" id="infoFecha"></small>
          <input type="hidden" name="fecha" id="fecha" value="" required />
        </div>

        <!-- Información de confirmación -->
        <div class="form-group full" id="containerConfirm" style="display:none;background:var(--bg-light);padding:1rem;border-radius:6px;border-left:3px solid var(--primary);">
          <p><strong>📋 Resumen de tu cita:</strong></p>
          <p id="resumenCita"></p>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" onclick="window.history.back();" class="btn btn-secondary">Cancelar</button>
        <button type="submit" class="btn btn-primary" id="btnConfirmar" style="display:none;">📅 Confirmar Cita</button>
      </div>
    </form>
  </div>
</div>

<script>
const documento = "{{ session.username }}"; // Usar el documento del usuario

async function cargarMedicos() {
  const tipoCita = document.getElementById('tipoCita').value;
  if (!tipoCita) {
    document.getElementById('containerMedico').style.display = 'none';
    document.getElementById('containerFecha').style.display = 'none';
    document.getElementById('containerConfirm').style.display = 'none';
    document.getElementById('btnConfirmar').style.display = 'none';
    document.getElementById('fecha').value = '';
    const calendar = document.getElementById('calendarFecha');
    if (calendar) calendar.innerHTML = '';
    return;
  }

  try {
    const response = await fetch(`/api/medicos-por-tipo/${tipoCita}`);
    const medicos = await response.json();
    
    const selectMedico = document.getElementById('medico');
    selectMedico.innerHTML = '<option value="">— Seleccione médico —</option>';
    
    if (medicos.length === 0) {
      selectMedico.innerHTML += '<option disabled>No hay médicos disponibles</option>';
      document.getElementById('containerMedico').style.display = 'block';
    } else {
      medicos.forEach(m => {
        const option = document.createElement('option');
        option.value = m.id;
        option.textContent = `${m.nombre} — ${m.especialidad}`;
        selectMedico.appendChild(option);
      });
      document.getElementById('containerMedico').style.display = 'block';
    }
    
    document.getElementById('containerFecha').style.display = 'none';
    document.getElementById('containerConfirm').style.display = 'none';
    document.getElementById('btnConfirmar').style.display = 'none';
  } catch (error) {
    console.error('Error cargando médicos:', error);
    alert('Error al cargar los médicos');
  }
}

async function cargarFechas() {
  const medicoId = document.getElementById('medico').value;
  const tipoCita = document.getElementById('tipoCita').value;
  const calendar = document.getElementById('calendarFecha');
  const infoFecha = document.getElementById('infoFecha');
  const fechaInput = document.getElementById('fecha');
  
  if (!medicoId) {
    document.getElementById('containerFecha').style.display = 'none';
    document.getElementById('containerConfirm').style.display = 'none';
    document.getElementById('btnConfirmar').style.display = 'none';
    fechaInput.value = '';
    if (calendar) calendar.innerHTML = '';
    return;
  }

  try {
    const response = await fetch(`/api/fechas-disponibles/${medicoId}`);
    const datos = await response.json();

    // Preparar disponibilidad por fecha (YYYY-MM-DD -> disponibles)
    const disponiblesMap = new Map();
    (datos.fechas || []).forEach(f => disponiblesMap.set(f.fecha, f.disponibles));

    // Reset selección
    fechaInput.value = '';
    if (calendar) calendar.innerHTML = '';

    // Construir calendario de los próximos 30 días en una tabla tipo grilla
    const startDate = new Date();
    startDate.setHours(0, 0, 0, 0);

    const totalDays = 30;
    const dayNames = ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'];

    function pad2(n) {
      return String(n).padStart(2, '0');
    }

    function formatISODateLocal(d) {
      return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
    }

    // JavaScript: 0=Dom..6=Sat. Convertir a índice con 0=Lun..6=Dom
    function mondayStartIndex(d) {
      return (d.getDay() + 6) % 7;
    }

    const startOffset = mondayStartIndex(startDate); // 0..6
    const weeks = Math.ceil((startOffset + totalDays) / 7);
    const totalCells = weeks * 7;

    const table = document.createElement('table');
    table.className = 'calendar-table';

    const thead = document.createElement('thead');
    const trh = document.createElement('tr');
    dayNames.forEach(n => {
      const th = document.createElement('th');
      th.textContent = n;
      trh.appendChild(th);
    });
    thead.appendChild(trh);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    for (let cell = 0; cell < totalCells; cell++) {
      if (cell % 7 === 0) {
        tbody.appendChild(document.createElement('tr'));
      }
      const row = tbody.lastChild;
      const td = document.createElement('td');
      td.className = 'day-cell';

      const dayIndex = cell - startOffset;
      if (dayIndex < 0 || dayIndex >= totalDays) {
        td.classList.add('day-empty');
        td.textContent = '';
        row.appendChild(td);
        continue;
      }

      const current = new Date(startDate);
      current.setDate(startDate.getDate() + dayIndex);
      const iso = formatISODateLocal(current);
      const dayNum = current.getDate();

      const disponibles = disponiblesMap.has(iso) ? disponiblesMap.get(iso) : 0;
      if (disponibles > 0) {
        td.classList.add('day-available');
        td.setAttribute('data-iso', iso);
        td.title = `${disponibles} ${disponibles === 1 ? 'lugar' : 'lugares'} disponibles`;
        td.innerHTML = `<div class="day-num">${dayNum}</div><div class="day-sub">${disponibles}</div>`;
        td.addEventListener('click', () => {
          // marcar seleccionado
          document.querySelectorAll('.day-cell.day-selected').forEach(el => el.classList.remove('day-selected'));
          fechaInput.value = iso;
          td.classList.add('day-selected');
          actualizarResumen();
        });
      } else {
        td.classList.add('day-unavailable');
        td.title = 'No disponible';
        td.innerHTML = `<div class="day-num">${dayNum}</div>`;
      }
      row.appendChild(td);
    }

    table.appendChild(tbody);
    calendar.appendChild(table);

    if ((datos.fechas || []).length === 0) {
      infoFecha.textContent = 'El médico no tiene disponibilidad en los próximos 30 días.';
    } else {
      infoFecha.textContent = 'Días disponibles (verde) e no disponibles (rojo). Selecciona un día verde.';
    }

    document.getElementById('containerFecha').style.display = 'block';
    document.getElementById('containerConfirm').style.display = 'none';
    document.getElementById('btnConfirmar').style.display = 'none';
  } catch (error) {
    console.error('Error cargando fechas:', error);
    alert('Error al cargar las fechas disponibles');
  }
}

function actualizarResumen() {
  const tipoCita = document.getElementById('tipoCita').value;
  const medicoSelect = document.getElementById('medico');
  const medicoNombre = medicoSelect.options[medicoSelect.selectedIndex].textContent;
  const fecha = document.getElementById('fecha').value;

  if (tipoCita && medicoNombre && fecha) {
    const fechaObj = new Date(fecha);
    const fechaFormato = fechaObj.toLocaleDateString('es-CO', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    
    document.getElementById('resumenCita').innerHTML = `
      <p>📋 <strong>Tipo:</strong> ${tipoCita}</p>
      <p>👨‍⚕️ <strong>Médico:</strong> ${medicoNombre}</p>
      <p>📅 <strong>Fecha:</strong> ${fechaFormato}</p>
    `;
    
    document.getElementById('containerConfirm').style.display = 'block';
    document.getElementById('btnConfirmar').style.display = 'block';
  } else {
    document.getElementById('containerConfirm').style.display = 'none';
    document.getElementById('btnConfirmar').style.display = 'none';
  }
}

document.getElementById('fecha').addEventListener('change', actualizarResumen);
document.getElementById('medico').addEventListener('change', cargarFechas);
</script>

<style>
.form-grid {
  display: grid;
  gap: 1.5rem;
}

.form-group {
  display: flex;
  flex-direction: column;
}

.form-group.full {
  grid-column: 1 / -1;
}

.form-group label {
  margin-bottom: 0.5rem;
  font-weight: 600;
  color: var(--dark);
}

.form-group select {
  padding: 0.75rem;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 1rem;
  font-family: inherit;
}

.form-group select:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
}

.form-actions {
  display: flex;
  gap: 1rem;
  margin-top: 2rem;
}

.btn {
  padding: 0.75rem 1.5rem;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-weight: 500;
  transition: all 0.3s;
}

.btn-primary {
  background-color: var(--primary);
  color: white;
}

.btn-primary:hover {
  background-color: #2563eb;
}

.btn-primary:disabled {
  background-color: #d1d5db;
  cursor: not-allowed;
}

.btn-secondary {
  background-color: var(--border);
  color: var(--dark);
}

.btn-secondary:hover {
  background-color: #d1d5db;
}

.btn-sm {
  padding: 0.5rem 1rem;
  font-size: 0.9rem;
}

small {
  display: block;
  margin-top: 0.25rem;
}

.calendar-container {
  margin-top: 0.5rem;
}

.calendar-table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

.calendar-table th {
  border: 1px solid var(--gray-light);
  padding: 0.35rem 0;
  font-size: 0.78rem;
  color: var(--gray);
  font-weight: 700;
}

.calendar-table td {
  border: 1px solid var(--gray-light);
  padding: 0.35rem 0;
  vertical-align: top;
}

.day-cell {
  cursor: pointer;
  user-select: none;
}

.day-empty {
  border: none;
  background: transparent;
}

.day-num {
  font-weight: 800;
  font-size: 0.95rem;
  color: var(--dark);
  line-height: 1.1;
}

.day-sub {
  margin-top: 0.1rem;
  font-size: 0.72rem;
  color: var(--gray);
}

/* Colores transparentes (no sólidos) */
.day-available {
  background: rgba(16, 185, 129, 0.18);
}

.day-unavailable {
  background: rgba(239, 68, 68, 0.18);
  cursor: not-allowed;
}

.day-selected {
  outline: 2px solid rgba(37, 99, 235, 0.9);
  outline-offset: -2px;
  background: rgba(37, 99, 235, 0.08) !important;
}

</style>
{% endblock %}
